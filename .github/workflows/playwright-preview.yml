name: Playwright Preview

on:
  deployment_status:

jobs:
  playwright-preview:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment_url != '' &&
      github.event.deployment.environment != 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_ALLOW_DESTRUCTIVE: ${{ secrets.E2E_ALLOW_DESTRUCTIVE }}
      E2E_ENTITY_PREFIX: ${{ secrets.E2E_ENTITY_PREFIX }}
      E2E_UPLOAD_TENANT_ID: ${{ secrets.E2E_UPLOAD_TENANT_ID }}
      E2E_OCCUPIED_ROOM_ID: ${{ secrets.E2E_OCCUPIED_ROOM_ID }}
      E2E_VACANT_ROOM_ID: ${{ secrets.E2E_VACANT_ROOM_ID }}
      E2E_EDITABLE_PROPERTY_ID: ${{ secrets.E2E_EDITABLE_PROPERTY_ID }}
      E2E_ENABLE_PROPERTY_CREATE: ${{ secrets.E2E_ENABLE_PROPERTY_CREATE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
